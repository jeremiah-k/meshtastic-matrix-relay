# Keep Bandit's assert rule in production code, but allow pytest-style asserts in tests.
assert_used:
  skips:
    - "*_test.py"
    - "*test_*.py"

# B105/B106 flag any string containing "password"/"token"/"secret" as a hardcoded secret.
# All 229 findings are test fixture values (e.g. 'test_token', 'test_password', 'secret123').
# Real secret detection is covered by trufflehog in the Trunk pipeline.
# These plugins do not support per-filepattern skips like assert_used does.
skips: ["B105", "B106"]
