name: Cross-Mesh Integration

on:
  pull_request:
    branches:
      - main
      - develop
      - "**-review"
  push:
    branches:
      - main
      - develop
      - "**-review"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-mesh-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MESHTASTICD_IMAGE: meshtastic/meshtasticd:latest
      SYNAPSE_IMAGE: matrixdotorg/synapse:latest
      CI_ARTIFACT_DIR: ${{ github.workspace }}/.ci-artifacts/cross-mesh-integration
      MMRELAY_LOG_ON_SUCCESS: "true"
      STRICT_MESH_TO_MATRIX: "true"
      MESHNET_NAME_A: "Backcountry Alpha"
      MESHNET_NAME_B: "Backcountry Bravo"
      MATRIX_EVENT_TIMEOUT_SECONDS: "75"
      MESSAGE_MAP_WAIT_TIMEOUT_SECONDS: "75"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-cross-mesh-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-e2e.txt || true

      - name: Run cross-mesh integration checks
        run: |
          bash scripts/ci/run-mmrelay-realistic-integration-cross-mesh.sh

      - name: Upload cross-mesh integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cross-mesh-integration-logs
          path: ${{ env.CI_ARTIFACT_DIR }}
          if-no-files-found: warn
