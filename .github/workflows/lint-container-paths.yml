name: Lint Container Paths

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  check-container-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Check for legacy container paths and environment variables
        run: |
          bash scripts/ci/check_container_paths.sh
