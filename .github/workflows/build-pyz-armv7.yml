name: Build PYZ (armv7)

on:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  actions: read

jobs:
  build-armv7-pyz:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Extract version and git SHA
        id: get_version
        run: |
          VERSION=$(grep "version =" setup.cfg | sed 's/.*= //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"
          GIT_SHA=$(git rev-parse --short HEAD)
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          # Set FILE_VERSION to just the version for releases, or version-dev-SHA for PRs/manual runs
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "FILE_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "FILE_VERSION=$VERSION-dev-$GIT_SHA" >> $GITHUB_ENV
          fi

      - name: Build inside ARMv7 Docker (shiv, rustup, fixed cargo config)
        uses: addnab/docker-run-action@v3
        with:
          image: arm32v7/python:3.10
          options: --platform linux/arm/v7 -v ${{ github.workspace }}:/github/workspace -w /github/workspace
          run: |
            set -e
            apt-get update
            apt-get install -y --no-install-recommends \
              gcc libffi-dev libssl-dev git libbluetooth-dev curl pkg-config \
              build-essential libatlas-base-dev libolm-dev python3-dev libjpeg-dev zlib1g-dev libtiff-dev libtiff6 unzip

            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            . "$HOME/.cargo/env"

            pip install --upgrade pip setuptools wheel maturin

            # Install the rest of the requirements
            pip install -r requirements.txt

            echo "Attempting to reinstall rpds-py from source..."
            pip uninstall -y rpds-py
            pip install -v --no-binary :all: --compile rpds-py

            pip install shiv
            mkdir -p dist

            # --- New step: Inspect site-packages for rpds ---
            echo "--- Inspecting site-packages for rpds compiled artifacts ---"
            SITE_PACKAGES_DIR=$(python -c 'import site; print(site.getsitepackages()[0])')
            echo "Site-packages directory is: $SITE_PACKAGES_DIR"
            echo "Listing contents of $SITE_PACKAGES_DIR/rpds* ..."
            ls -R $SITE_PACKAGES_DIR/rpds* || echo "rpds directory not found in site-packages"
            echo "Looking for rpds compiled objects..."
            find $SITE_PACKAGES_DIR -name "rpds*.so" -o -name "_rpds*.so"

            # Prepare directory for vendoring libtiff
            echo "--- Preparing directory for vendoring libtiff ---"
            mkdir -p _shiv_libs

            # --- Check Pillow linkage ---
            echo "--- Checking Pillow's _imaging.so linkage ---"
            SITE_PACKAGES_DIR=$(python -c 'import site; print(site.getsitepackages()[0])')
            IMAGING_SO_PATH=$(find $SITE_PACKAGES_DIR/PIL -name "_imaging*.so" | head -n 1)
            if [ -n "$IMAGING_SO_PATH" ]; then
              echo "Found _imaging.so at: $IMAGING_SO_PATH"
              echo "Running ldd on _imaging.so:"
              ldd $IMAGING_SO_PATH || echo "ldd command failed or _imaging.so not found"
              echo "Checking for libtiff.so.5 in ldd output:"
              ldd $IMAGING_SO_PATH | grep 'libtiff.so.5' || echo "libtiff.so.5 NOT found in ldd output for _imaging.so"
              echo "Checking for libtiff.so.6 in ldd output:"
              ldd $IMAGING_SO_PATH | grep 'libtiff.so.6' || echo "libtiff.so.6 NOT found in ldd output for _imaging.so (this is good)"
            else
              echo "ERROR: _imaging.so not found in $SITE_PACKAGES_DIR/PIL"
            fi
            echo "--- Finished checking Pillow linkage ---"

            # --- Copy libtiff.so.6 and its real file into _shiv_libs ---
            echo "--- Finding and vendoring libtiff.so.6 ---"
            SITE_PACKAGES_DIR=$(python -c 'import site; print(site.getsitepackages()[0])')
            IMAGING_SO_PATH=$(find $SITE_PACKAGES_DIR/PIL -name "_imaging*.so" | head -n 1)
            if [ -n "$IMAGING_SO_PATH" ]; then
              LIBTIFF_PATH_LINE=$(ldd $IMAGING_SO_PATH | grep 'libtiff.so.6')
              if [ -n "$LIBTIFF_PATH_LINE" ]; then
                # Extract the path: "libtiff.so.6 => /path/to/libtiff.so.6 (0xb...)" -> "/path/to/libtiff.so.6"
                LIBTIFF_SYMLINK_PATH=$(echo $LIBTIFF_PATH_LINE | awk '{print $3}')
                if [ -L "$LIBTIFF_SYMLINK_PATH" ]; then
                  echo "Found libtiff.so.6 symlink at: $LIBTIFF_SYMLINK_PATH"
                  LIBTIFF_REAL_PATH=$(readlink -f $LIBTIFF_SYMLINK_PATH)
                  echo "Real libtiff.so.6 file is: $LIBTIFF_REAL_PATH"

                  echo "Copying $LIBTIFF_SYMLINK_PATH to _shiv_libs/"
                  cp -L $LIBTIFF_SYMLINK_PATH _shiv_libs/libtiff.so.6
                  LIBTIFF_REAL_FILENAME=$(basename $LIBTIFF_REAL_PATH)
                  if [ "$LIBTIFF_REAL_FILENAME" != "libtiff.so.6" ]; then
                    echo "Copying $LIBTIFF_REAL_PATH to _shiv_libs/$LIBTIFF_REAL_FILENAME"
                    cp $LIBTIFF_REAL_PATH _shiv_libs/$LIBTIFF_REAL_FILENAME
                  fi

                  echo "Contents of _shiv_libs:"
                  ls -la _shiv_libs/
                else
                  echo "ERROR: $LIBTIFF_SYMLINK_PATH is not a symlink or not found."
                fi
              else
                echo "ERROR: libtiff.so.6 not found in ldd output for $IMAGING_SO_PATH. Cannot vendor."
              fi
            else
              echo "ERROR: _imaging.so not found. Cannot determine libtiff path."
            fi
            echo "--- Finished vendoring libtiff.so.6 ---"

            # --- Create the wrapper script for LD_LIBRARY_PATH ---
            echo "--- Creating run_mmrelay.sh wrapper ---"
            cat << 'EOF' > run_mmrelay.sh
#!/bin/sh
# Get the directory where the PYZ is extracted
# SHIV_ROOT is set by shiv's bootstrap process to the extraction path
APP_DIR="$SHIV_ROOT"

# Prepend our vendored libs to LD_LIBRARY_PATH
export LD_LIBRARY_PATH="$APP_DIR/_shiv_libs:$LD_LIBRARY_PATH"

# Execute the original Python entry point
exec python -m mmrelay.cli "$@"
EOF
            chmod +x run_mmrelay.sh
            echo "run_mmrelay.sh created:"
            cat run_mmrelay.sh
            echo "--- Finished creating wrapper script ---"

            # Build the PYZ file with the correct entry point
            python -m shiv --compressed \
              --compile-pyc \
              --reproducible \
              --entry-point run_mmrelay.sh \
              --output-file dist/mmrelay-${{ env.FILE_VERSION }}-armv7.pyz \
              .

            # Test the PYZ file
            echo "--- Testing PYZ file ---"
            chmod +x dist/mmrelay-${{ env.FILE_VERSION }}-armv7.pyz
            dist/mmrelay-${{ env.FILE_VERSION }}-armv7.pyz --version || echo "PYZ test failed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmrelay-${{ env.FILE_VERSION }}-armv7
          path: dist/*.pyz

      - name: Upload PYZ to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pyz
