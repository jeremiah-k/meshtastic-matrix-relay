name: Build PYZ (armv7)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-armv7-pyz:
    runs-on: ubuntu-latest
    env:
      # TODO: Pin to a digest (e.g., @sha256:...) for reproducibility. The :latest tag is mutable
      # and can change, breaking cache reproducibility. Resolve the digest with:
      # docker buildx imagetools inspect ghcr.io/jeremiah-k/mmrelay-builder-armv7:latest
      BUILDER_IMAGE: ghcr.io/jeremiah-k/mmrelay-builder-armv7:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: all

      - name: Derive ARMv7 builder image cache metadata
        id: builder-image-cache-meta
        shell: bash
        run: |
          set -euo pipefail
          cache_key_suffix="$(printf '%s' "${BUILDER_IMAGE}" | sha256sum | awk '{print $1}')-$(date -u +%Y-W%W)"
          cache_dir="${RUNNER_TEMP}/builder-image-cache"
          cache_path="${cache_dir}/${cache_key_suffix}.tar"
          echo "cache_key=${RUNNER_OS}-builder-image-${cache_key_suffix}" >> "${GITHUB_OUTPUT}"
          echo "cache_path=${cache_path}" >> "${GITHUB_OUTPUT}"

      - name: Restore cached ARMv7 builder image
        id: builder-image-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.builder-image-cache-meta.outputs.cache_path }}
          key: ${{ steps.builder-image-cache-meta.outputs.cache_key }}

      - name: Load cached ARMv7 builder image
        if: ${{ steps.builder-image-cache.outputs.cache-hit == 'true' }}
        run: |
          docker load -i "${{ steps.builder-image-cache-meta.outputs.cache_path }}"

      - name: Extract version and git SHA
        id: get_version
        run: |
          # Extract version from mmrelay module
          VERSION=$(python3 -c "import sys; sys.path.insert(0, 'src'); from mmrelay import __version__; print(__version__)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"
          GIT_SHA=$(git rev-parse --short HEAD)
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          # Set FILE_VERSION to just the version for releases, or version-dev-SHA for PRs/manual runs
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "FILE_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "FILE_VERSION=$VERSION-dev-$GIT_SHA" >> $GITHUB_ENV
          fi

      - name: Build inside ARMv7 Docker (using pre-built builder)
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185 # v3
        with:
          image: ${{ env.BUILDER_IMAGE }}
          options: --platform linux/arm/v7 -v ${{ github.workspace }}:/github/workspace -w /github/workspace
          run: |
            echo "=== Using pre-built ARMv7 environment ==="
            echo "Rust version: $(rustc --version)"
            echo "Cross-compilation target: $(rustup target list --installed | grep armv7)"
            echo "GCC version: $(arm-linux-gnueabihf-gcc --version | head -1)"
            echo "Python version: $(python --version)"
            echo "Build tools ready!"

            echo "=== Attempting to use pre-built rpds-py or build from source ==="
            # Check if rpds-py is already available from pre-build
            if python -c "import rpds" 2>/dev/null; then
              echo "✅ rpds-py already available from pre-built environment"
            else
              echo "Building rpds-py from source..."
              pip install rpds-py --no-binary=rpds-py -v || {
                echo "WARNING: rpds-py build failed, falling back to version pinning"
                pip install "jsonschema<4.0.0" "referencing<0.30.0"
              }
            fi

            echo "=== Installing package dependencies from pyproject.toml ==="
            pip install .
            mkdir -p dist

            echo "=== Verifying rpds-py installation ==="
            python -c "
            try:
                from rpds import HashTrieMap
                print('✅ rpds-py imported successfully')
            except ImportError as e:
                print(f'⚠️  rpds-py import failed: {e}')
                print('Continuing with fallback versions...')
            "

            echo "=== Building PYZ file ==="
            python -m shiv --compressed \
              --compile-pyc \
              --reproducible \
              --entry-point mmrelay.cli:main \
              --output-file dist/mmrelay-${{ env.FILE_VERSION }}-armv7.pyz \
              .

            echo "=== Testing PYZ file ==="
            chmod +x dist/mmrelay-${{ env.FILE_VERSION }}-armv7.pyz
            if ! dist/mmrelay-${{ env.FILE_VERSION }}-armv7.pyz --version; then
              echo "❌ PYZ test failed - the built file cannot execute properly"
              exit 1
            fi
            echo "✅ PYZ test passed"

      - name: Save ARMv7 builder image tar
        id: builder-image-tar
        if: ${{ success() && steps.builder-image-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cache_path="${{ steps.builder-image-cache-meta.outputs.cache_path }}"
          mkdir -p "$(dirname "${cache_path}")"
          if docker image inspect "${BUILDER_IMAGE}" >/dev/null 2>&1; then
            docker save "${BUILDER_IMAGE}" -o "${cache_path}"
            echo "saved=true" >> "${GITHUB_OUTPUT}"
          else
            echo "saved=false" >> "${GITHUB_OUTPUT}"
            echo "builder image not present locally; skipping cache archive."
          fi

      - name: Persist cached ARMv7 builder image
        if: ${{ success() && steps.builder-image-cache.outputs.cache-hit != 'true' && steps.builder-image-tar.outputs.saved == 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.builder-image-cache-meta.outputs.cache_path }}
          key: ${{ steps.builder-image-cache-meta.outputs.cache_key }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mmrelay-${{ env.FILE_VERSION }}-armv7
          path: dist/*.pyz

      - name: Upload PYZ to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*.pyz
