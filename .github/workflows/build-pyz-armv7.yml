name: Build PYZ (femtofox-armv7)
run-name: Build PYZ (femtofox-armv7)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  actions: read

jobs:
  build-femtofox-armv7-pyz:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Extract version and git SHA
        id: get_version
        run: |
          # Extract version from mmrelay module
          VERSION=$(python3 -c "import sys; sys.path.insert(0, 'src'); from mmrelay import __version__; print(__version__)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"
          GIT_SHA=$(git rev-parse --short HEAD)
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          # Set FILE_VERSION to just the version for releases, or version-dev-SHA for PRs/manual runs
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "FILE_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "FILE_VERSION=$VERSION-dev-$GIT_SHA" >> $GITHUB_ENV
          fi

      - name: Build inside Femtofox Docker (using pre-built builder)
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/jeremiah-k/mmrelay-femtofox-builder:latest
          options: --platform linux/arm/v7 -v ${{ github.workspace }}:/github/workspace -w /github/workspace
          run: |
            echo "=== Using pre-built ARMv7 environment ==="
            echo "Rust version: $(rustc --version)"
            echo "Cross-compilation target: $(rustup target list --installed | grep armv7)"
            echo "GCC version: $(arm-linux-gnueabihf-gcc --version | head -1)"
            echo "Python version: $(python --version)"
            echo "Build tools ready!"

            echo "=== Attempting to use pre-built rpds-py or build from source ==="
            # Check if rpds-py is already available from pre-build
            if python -c "import rpds" 2>/dev/null; then
              echo "✅ rpds-py already available from pre-built environment"
            else
              echo "Building rpds-py from source..."
              pip install rpds-py --no-binary=rpds-py -v || {
                echo "WARNING: rpds-py build failed, falling back to version pinning"
                pip install "jsonschema<4.0.0" "referencing<0.30.0"
              }
            fi

            echo "=== Installing core requirements from local wheelhouse first (no index) ==="
            export WHEELHOUSE=/opt/wheels
            # Force-install our repaired Pillow and heavy wheels from the wheelhouse
            pip install --no-index --find-links "$WHEELHOUSE" \
              Pillow==11.3.0 numpy==2.2.6 matplotlib==3.10.1 \
              kiwisolver==1.4.9 contourpy==1.3.2 dbus-fast==2.44.3 \
              psutil==7.0.0 pyyaml==6.0.2

            echo "=== Installing remaining requirements (with index, prefer local) ==="
            export PIP_FIND_LINKS="$WHEELHOUSE"
            pip install -r requirements.txt

            echo "=== Installing E2EE requirements (python-olm, nio[e2e]) ==="
            pip install -r requirements-e2e.txt

            echo "=== Verifying Pillow install source and codec support ==="
            python - << 'PY'
            import pkgutil, PIL, subprocess, sys
            import PIL.features as F
            import importlib
            print('Pillow version:', PIL.__version__)
            try:
                w = importlib.import_module('PIL._imaging')
                print('PIL._imaging:', w.__file__)
            except Exception as e:
                print('Failed importing PIL._imaging:', e)
            print('JPEG support:', F.check_feature('jpg'))
            PY
            mkdir -p dist

            echo "=== Verifying rpds-py installation ==="
            python -c "
            try:
                from rpds import HashTrieMap
                print('✅ rpds-py imported successfully')
            except ImportError as e:
                print(f'⚠️  rpds-py import failed: {e}')
                print('Continuing with fallback versions...')
            "

            echo "=== Building PYZ file (femtofox-armv7, py310 ABI) ==="
            # Use a py310 shebang so the script executes with Python 3.10 on target devices
            python -m shiv --compressed \
              --compile-pyc \
              --reproducible \
              -p "/usr/bin/env python3.10" \
              --entry-point mmrelay.cli:main \
              --output-file dist/mmrelay-${{ env.FILE_VERSION }}-femtofox-armv7.pyz \
              .

            echo "=== Testing PYZ file ==="
            chmod +x dist/mmrelay-${{ env.FILE_VERSION }}-femtofox-armv7.pyz
            if ! dist/mmrelay-${{ env.FILE_VERSION }}-femtofox-armv7.pyz --version; then
              echo "❌ PYZ test failed - the built file cannot execute properly"
              exit 1
            fi
            echo "✅ PYZ test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmrelay-${{ env.FILE_VERSION }}-femtofox-armv7
          path: dist/*.pyz

      - name: Upload PYZ to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pyz
