name: Package Windows Installer

on:
  workflow_dispatch:
  release:
    types: [published]
  pull_request:
    branches: [main, develop, "**-review"]
    paths:
      - .github/workflows/package-windows.yml
      - scripts/mmrelay.iss
      - src/**

concurrency:
  group: windows-installer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: Extract version and git SHA
        id: get_version
        shell: bash
        run: |
          set -euo pipefail

          # Extract version from pyproject.toml
          VERSION="$(
            python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])"
          )"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Extracted version: $VERSION"
          GIT_SHA=$(git rev-parse --short HEAD)
          echo "GIT_SHA=$GIT_SHA" >> "$GITHUB_ENV"
          # Set FILE_VERSION to just the version for releases, or version-dev-SHA for PRs/manual runs
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "FILE_VERSION=$VERSION" >> "$GITHUB_ENV"
          else
            echo "FILE_VERSION=$VERSION-dev-$GIT_SHA" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --name=mmrelay.exe --onefile --console --collect-all rich src/mmrelay/main.py

      - name: Build installer
        # Intentionally using a SHA-pinned action that supports `filepath` + `options`.
        # Keep this pinned to control supply-chain risk and avoid interface drift.
        uses: sharktide/iscc-cli@c94f2cbc0fc82dede0efad402dca3dfa3a1ede2a # 1.0.0
        with:
          filepath: ./scripts/mmrelay.iss
          options: "/DAppVersion=${{ env.FILE_VERSION }}"

      - name: Upload installer as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: MMRelay_setup_${{ env.FILE_VERSION }}
          path: scripts/MMRelay_setup_${{ env.FILE_VERSION }}.exe

      - name: Upload installer to GitHub Release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: scripts/MMRelay_setup_${{ env.FILE_VERSION }}.exe
          asset_name: MMRelay_setup_${{ env.FILE_VERSION }}.exe
          tag: ${{ github.ref }}
          overwrite: true
