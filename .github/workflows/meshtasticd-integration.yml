name: Meshtasticd Integration

on:
  pull_request:
    branches:
      - main
      - develop
      - "**-review"
  push:
    branches:
      - main
      - develop
      - "**-review"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  meshtasticd-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Docker Hub login for higher rate limits (200 vs 100 pulls/6 hours)
    # Create a free Docker Hub account and add these secrets:
    #   DOCKERHUB_USERNAME: your Docker Hub username
    #   DOCKERHUB_TOKEN: Docker Hub access token (from Account Settings > Security)
    # If secrets are not configured, pulls will still work but may hit rate limits.
    env:
      # Pinned, validated image digests for deterministic CI behavior.
      MESHTASTICD_IMAGE: meshtastic/meshtasticd@sha256:1b8d88cd63991bfecb8b8ff1801b9ee806447299b849eff19d03bc6ae0edcd65 # 2.7.15
      SYNAPSE_IMAGE: matrixdotorg/synapse@sha256:f223f5fc532600801284fededefca82288fb71551bf4fcc89cd0b3363a3461cc # v1.149.0
      CI_ARTIFACT_DIR: ${{ github.workspace }}/.ci-artifacts/meshtasticd-integration
      MMRELAY_LOG_ON_SUCCESS: "true"
      MESHNET_NAME_A: Backcountry Alpha
      MESHNET_NAME_B: Backcountry Bravo
      MATRIX_EVENT_TIMEOUT_SECONDS: "75"
      MESSAGE_MAP_WAIT_TIMEOUT_SECONDS: "75"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Derive meshtasticd image cache metadata
        id: meshtasticd-cache
        shell: bash
        run: |
          set -euo pipefail
          digest="${MESHTASTICD_IMAGE##*@sha256:}"
          if [[ "${digest}" == "${MESHTASTICD_IMAGE}" ]]; then
            digest="$(printf '%s' "${MESHTASTICD_IMAGE}" | sha256sum | awk '{print $1}')"
          fi
          cache_dir="${RUNNER_TEMP}/meshtasticd-image-cache"
          cache_path="${cache_dir}/${digest}.tar"
          {
            echo "digest=${digest}"
            echo "cache_key=${RUNNER_OS}-meshtasticd-image-${digest}"
            echo "cache_path=${cache_path}"
          } >> "${GITHUB_OUTPUT}"

      - name: Derive Synapse image cache metadata
        id: synapse-cache
        shell: bash
        run: |
          set -euo pipefail
          digest="${SYNAPSE_IMAGE##*@sha256:}"
          if [[ "${digest}" == "${SYNAPSE_IMAGE}" ]]; then
            digest="$(printf '%s' "${SYNAPSE_IMAGE}" | sha256sum | awk '{print $1}')"
          fi
          cache_dir="${RUNNER_TEMP}/synapse-image-cache"
          cache_path="${cache_dir}/${digest}.tar"
          {
            echo "digest=${digest}"
            echo "cache_key=${RUNNER_OS}-synapse-image-${digest}"
            echo "cache_path=${cache_path}"
          } >> "${GITHUB_OUTPUT}"

      - name: Restore cached meshtasticd image
        id: meshtasticd-image-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.meshtasticd-cache.outputs.cache_path }}
          key: ${{ steps.meshtasticd-cache.outputs.cache_key }}

      - name: Restore cached Synapse image
        id: synapse-image-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.synapse-cache.outputs.cache_path }}
          key: ${{ steps.synapse-cache.outputs.cache_key }}

      - name: Load cached meshtasticd image
        if: ${{ steps.meshtasticd-image-cache.outputs.cache-hit == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cache_tag="meshtastic/meshtasticd:ci-cache-${{ steps.meshtasticd-cache.outputs.digest }}"
          load_output="$(docker load -i "${{ steps.meshtasticd-cache.outputs.cache_path }}")"
          echo "${load_output}"
          loaded_ref="$(printf '%s\n' "${load_output}" | awk -F': ' '/Loaded image: /{print $2}' | tail -n 1)"
          loaded_id="$(printf '%s\n' "${load_output}" | awk -F': ' '/Loaded image ID: /{print $2}' | tail -n 1)"
          if [[ -n "${loaded_ref}" ]]; then
            docker tag "${loaded_ref}" "${cache_tag}"
          elif [[ -n "${loaded_id}" ]]; then
            docker tag "${loaded_id}" "${cache_tag}"
          else
            echo "Unable to resolve loaded meshtasticd image reference from cache tar" >&2
            exit 1
          fi
          echo "MESHTASTICD_IMAGE=${cache_tag}" >> "${GITHUB_ENV}"
          echo "MMRELAY_ALLOW_TAGGED_IMAGE_CACHE=true" >> "${GITHUB_ENV}"

      - name: Load cached Synapse image
        if: ${{ steps.synapse-image-cache.outputs.cache-hit == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cache_tag="matrixdotorg/synapse:ci-cache-${{ steps.synapse-cache.outputs.digest }}"
          load_output="$(docker load -i "${{ steps.synapse-cache.outputs.cache_path }}")"
          echo "${load_output}"
          loaded_ref="$(printf '%s\n' "${load_output}" | awk -F': ' '/Loaded image: /{print $2}' | tail -n 1)"
          loaded_id="$(printf '%s\n' "${load_output}" | awk -F': ' '/Loaded image ID: /{print $2}' | tail -n 1)"
          if [[ -n "${loaded_ref}" ]]; then
            docker tag "${loaded_ref}" "${cache_tag}"
          elif [[ -n "${loaded_id}" ]]; then
            docker tag "${loaded_id}" "${cache_tag}"
          else
            echo "Unable to resolve loaded Synapse image reference from cache tar" >&2
            exit 1
          fi
          echo "SYNAPSE_IMAGE=${cache_tag}" >> "${GITHUB_ENV}"
          echo "MMRELAY_ALLOW_TAGGED_IMAGE_CACHE=true" >> "${GITHUB_ENV}"

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-meshtasticd-integration-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[e2e]'

      - name: Run meshtasticd integration checks
        run: |
          timeout --foreground 13m bash scripts/ci/run-mmrelay-meshtasticd-integration.sh

      - name: Save meshtasticd image tar
        id: meshtasticd-image-tar
        if: ${{ always() && steps.meshtasticd-image-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cache_path="${{ steps.meshtasticd-cache.outputs.cache_path }}"
          mkdir -p "$(dirname "${cache_path}")"
          if docker image inspect "${MESHTASTICD_IMAGE}" >/dev/null 2>&1; then
            docker save "${MESHTASTICD_IMAGE}" -o "${cache_path}"
            echo "saved=true" >> "${GITHUB_OUTPUT}"
          else
            echo "saved=false" >> "${GITHUB_OUTPUT}"
            echo "meshtasticd image not present locally; skipping cache archive."
          fi

      - name: Save Synapse image tar
        id: synapse-image-tar
        if: ${{ always() && steps.synapse-image-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cache_path="${{ steps.synapse-cache.outputs.cache_path }}"
          mkdir -p "$(dirname "${cache_path}")"
          if docker image inspect "${SYNAPSE_IMAGE}" >/dev/null 2>&1; then
            docker save "${SYNAPSE_IMAGE}" -o "${cache_path}"
            echo "saved=true" >> "${GITHUB_OUTPUT}"
          else
            echo "saved=false" >> "${GITHUB_OUTPUT}"
            echo "synapse image not present locally; skipping cache archive."
          fi

      - name: Persist cached meshtasticd image
        if: ${{ always() && steps.meshtasticd-image-cache.outputs.cache-hit != 'true' && steps.meshtasticd-image-tar.outputs.saved == 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.meshtasticd-cache.outputs.cache_path }}
          key: ${{ steps.meshtasticd-cache.outputs.cache_key }}

      - name: Persist cached Synapse image
        if: ${{ always() && steps.synapse-image-cache.outputs.cache-hit != 'true' && steps.synapse-image-tar.outputs.saved == 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.synapse-cache.outputs.cache_path }}
          key: ${{ steps.synapse-cache.outputs.cache_key }}

      - name: Display integration summary
        if: always()
        run: |
          SUMMARY_PATH="${CI_ARTIFACT_DIR}/shared/observability-summary.md"
          echo "===== Meshtasticd Integration Summary ====="
          if [[ -f "${SUMMARY_PATH}" ]]; then
            cat "${SUMMARY_PATH}"
          else
            echo "Summary file not found at ${SUMMARY_PATH}"
          fi

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: meshtasticd-integration-logs
          path: |
            ${{ env.CI_ARTIFACT_DIR }}/instance-a/logs/**
            ${{ env.CI_ARTIFACT_DIR }}/instance-b/logs/**
            ${{ env.CI_ARTIFACT_DIR }}/shared/logs/**
            ${{ env.CI_ARTIFACT_DIR }}/shared/observability-summary.md
            ${{ env.CI_ARTIFACT_DIR }}/instance-a/config.yaml
            ${{ env.CI_ARTIFACT_DIR }}/instance-b/config.yaml
          if-no-files-found: warn
