name: Realistic Integration

on:
  pull_request:
    branches:
      - main
      - develop
      - "**-review"
  push:
    branches:
      - main
      - develop
      - "**-review"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  realistic-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MESHTASTICD_IMAGE: meshtastic/meshtasticd:latest
      SYNAPSE_IMAGE: matrixdotorg/synapse:latest
      CI_ARTIFACT_DIR: ${{ github.workspace }}/.ci-artifacts/realistic-integration
      MMRELAY_LOG_ON_SUCCESS: "true"
      STRICT_MESH_TO_MATRIX: "false"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-realistic-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-realistic-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run realistic integration checks
        run: |
          bash scripts/ci/run-mmrelay-realistic-integration.sh

      - name: Upload realistic integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: realistic-integration-logs
          path: ${{ env.CI_ARTIFACT_DIR }}
          if-no-files-found: warn
