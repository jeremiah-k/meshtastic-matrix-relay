[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mmrelay"
version = "0.1.0"
description = "Meshtastic Matrix Relay"
authors = [
    { name="AgentGrunt", email="grunt@agentgrunt.com" },
]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "meshtastic",
    "nio",
    "pyyaml",
    "pillow"
    "Pillow==11.1.0",
    "git+https://github.com/flopp/py-staticmaps.git@e0266dc40163e87ce42a0ea5d8836a9a4bd92208",
    "matrix-nio==0.25.2",
    "matplotlib==3.10.1",
    "requests==2.32.3",
    "markdown==3.7",
    "haversine==2.9.0",
    "schedule==1.2.2",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
mmrelay = "mmrelay.main:main"